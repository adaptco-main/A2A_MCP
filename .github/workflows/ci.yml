name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  merge-marker-guard:
    name: Merge Marker Guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.8"

      - name: Fail on unresolved merge markers
        run: |
          if [ -f scripts/check_merge_conflicts.py ]; then
            python scripts/check_merge_conflicts.py --root .
          else
            echo "scripts/check_merge_conflicts.py not found; skipping merge marker check."
          fi

  behavior:
    name: Behavior Validator
    runs-on: ubuntu-latest
    needs: merge-marker-guard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.8"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Validate MCP 3D agent execution spec pack
        run: |
          if [ -f scripts/validate_mcp_3d_agent_execution_spec.py ]; then
            python scripts/validate_mcp_3d_agent_execution_spec.py --strict
          else
            echo "scripts/validate_mcp_3d_agent_execution_spec.py not found; skipping strict pack validation."
          fi

      - name: Behavior validator (fast)
        run: |
          if [ -f scripts/run_behavior_validator.sh ]; then
            if [ -d tests/behavior/cases ]; then
              sed -i 's/\r$//' scripts/run_behavior_validator.sh
              bash scripts/run_behavior_validator.sh
            else
              echo "No tests/behavior/cases directory found. Skipping behavior gate."
            fi
          else
            echo "Behavior validator script not found, skipping."
          fi

      - name: Upload behavior artifacts (debug)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: staging-behavior
          path: staging/
          if-no-files-found: ignore

  receipts:
    name: Receipt Validator
    runs-on: ubuntu-latest
    needs: behavior
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.8"

      - name: Receipt validator
        run: |
          if [ -f scripts/run_receipt_validator.sh ]; then
            if [ -d tests/receipts/cases ]; then
              sed -i 's/\r$//' scripts/run_receipt_validator.sh
              bash scripts/run_receipt_validator.sh
            else
              echo "No tests/receipts/cases directory found. Skipping receipt gate."
            fi
          else
            echo "Receipt validator script not found, skipping."
          fi

      - name: Upload receipt artifacts (debug)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: staging-receipts
          path: staging/
          if-no-files-found: ignore

  build-js:
    runs-on: ubuntu-latest
    needs: merge-marker-guard
    steps:
      - uses: actions/checkout@v4

      - name: Upload staging artifacts (debug)
        if: failure()
        uses: actions/upload-artifact@v4
        main
        with:
          run_install: false
          version: "9.7.1"
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false
      - name: Lint
        run: pnpm lint || true
      - name: Test kernel
        run: |
          if pnpm list --filter @world-os/kernel > /dev/null 2>&1; then
            pnpm --filter @world-os/kernel test
          fi
      - name: Test contracts
        run: |
          if pnpm list --filter @world-os/contracts > /dev/null 2>&1; then
            pnpm --filter @world-os/contracts test
          fi
