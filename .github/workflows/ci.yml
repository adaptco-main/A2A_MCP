name: CI

on:
  pull_request:
  push:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  behavior:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.8"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Behavior validator (fast)
        run: |
          if [ -f scripts/run_behavior_validator.sh ]; then
            bash scripts/run_behavior_validator.sh
          else
            echo "Behavior validator script not found, skipping."
          fi

      - name: Upload staging artifacts (debug)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: staging-behavior
          path: staging/

  receipts:
    runs-on: ubuntu-latest
    needs: behavior
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.8"

      - name: ReceiptOps v2 validator (constitutional gate)
        run: |
          if [ -f scripts/run_receipt_validator.sh ]; then
            bash scripts/run_receipt_validator.sh
          else
            echo "Receipt validator script not found, skipping."
          fi

      - name: Upload receipt artifacts (debug)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: staging-receipts
          path: staging/

  build-js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
          version: "9.7.1"
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false
      - name: Lint
        run: pnpm lint || true
      - name: Test kernel
        run: |
          if pnpm list --filter @world-os/kernel > /dev/null 2>&1; then
            pnpm --filter @world-os/kernel test
          fi
      - name: Test contracts
        run: |
          if pnpm list --filter @world-os/contracts > /dev/null 2>&1; then
            pnpm --filter @world-os/contracts test
          fi
