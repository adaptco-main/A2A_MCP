name: Worldline Hardened Pipeline

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  security-gate:
    runs-on: ubuntu-latest
    outputs:
      source_ok: ${{ steps.check-ref.outputs.source_ok }}
      target_ok: ${{ steps.check-ref.outputs.target_ok }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check reference integrity
        id: check-ref
        shell: bash
        run: |
          SOURCE_REF="${{ github.head_ref }}"
          TARGET_REF="${{ github.base_ref }}"
          
          echo "Source: $SOURCE_REF"
          echo "Target: $TARGET_REF"

          source_ok=false
          target_ok=false
          
          # Adopt more flexible checks from main
          [[ "$SOURCE_REF" == worldline* ]] && source_ok=true
          [[ "$TARGET_REF" == "main" ]] && target_ok=true

          echo "source_ok=$source_ok" >> "$GITHUB_OUTPUT"
          echo "target_ok=$target_ok" >> "$GITHUB_OUTPUT"

  validate:
    needs: security-gate
    if: needs.security-gate.outputs.source_ok == 'true' && needs.security-gate.outputs.target_ok == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Hardened Validation
        run: |
          echo "Running hardened validation for worldline -> main"
          # Add actual validation commands here
