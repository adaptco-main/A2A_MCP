name: PR Commit Validation

on:
  pull_request:
    branches: [ main ]

jobs:
  validate-commits:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pytest torch

      - name: Validate Commits
        shell: python
        run: |
          import subprocess
          import sys
          import json
          import os
          import time
          from pathlib import Path

          def get_commits():
              base = os.environ.get('GITHUB_BASE_REF')
              head = os.environ.get('GITHUB_HEAD_REF')
              # Get list of commits in PR
              cmd = ['git', 'log', f'origin/{base}..HEAD', '--format=%H']
              return subprocess.check_output(cmd).decode().split()

          commits = get_commits()
          event_name = os.environ.get('GITHUB_EVENT_NAME')
          base = os.environ.get('GITHUB_BASE_REF')
          head = os.environ.get('GITHUB_HEAD_REF')

          report = {
              'event': event_name,
              'base_sha': base,
              'head_sha': head,
              'test_command': 'PYTHONPATH=scripts:src pytest -q tests/test_mcp_agents.py',
              'commit_results': [],
          }

          success = True
          for sha in reversed(commits):
              print(f"Validating commit: {sha}")
              try:
                  subprocess.check_call(['git', 'checkout', '--quiet', sha])
                  start = time.time()
                  env = dict(os.environ)
                  env['PYTHONPATH'] = 'scripts:src:.'
                  
                  # Adopt existence check from main but keep our test file
                  if Path('tests/test_mcp_agents.py').exists():
                      proc = subprocess.run(
                          ['pytest', '-q', 'tests/test_mcp_agents.py'],
                          text=True,
                          capture_output=True,
                          env=env,
                      )
                  else:
                      proc = subprocess.CompletedProcess(
                          args=['pytest', '-q', 'tests/test_mcp_agents.py'],
                          returncode=0,
                          stdout='skipped: tests/test_mcp_agents.py not found for this commit',
                          stderr='',
                      )
                      
                  duration = round(time.time() - start, 2)
                  report['commit_results'].append(
                      {
                          'sha': sha,
                          'status': 'passed' if proc.returncode == 0 else 'failed',
                          'duration': duration,
                          'output': proc.stdout + proc.stderr
                      }
                  )
                  if proc.returncode != 0:
                      success = False
              except Exception as e:
                  print(f"Error validating {sha}: {e}")
                  success = False

          # Final report
          print(json.dumps(report, indent=2))
          if not success:
              sys.exit(1)
