name: CI

on:
  pull_request:
  push:
    branches: [develop, main]

jobs:
  behavior:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.8"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Behavior validator (fast)
        run: |
          if [ -f scripts/run_behavior_validator.sh ]; then
            bash scripts/run_behavior_validator.sh
          else
            echo "scripts/run_behavior_validator.sh not found, skipping"
          fi

      - name: Upload staging artifacts (debug)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: staging-behavior
          path: staging/

  receipts:
    runs-on: ubuntu-latest
    needs: behavior
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.8"

      - name: ReceiptOps v2 validator (constitutional gate)
        run: |
          if [ -f scripts/run_receipt_validator.sh ]; then
            bash scripts/run_receipt_validator.sh
          else
            echo "scripts/run_receipt_validator.sh not found, skipping"
          fi

      - name: Upload receipt artifacts (debug)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: staging-receipts
          path: staging/

  pnpm-install:
    name: Install Workspace Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "9.7.1"

      - name: Install dependencies
        run: |
          if [ -f pnpm-workspace.yaml ]; then
            pnpm install --frozen-lockfile=false
          else
            echo "pnpm-workspace.yaml not found, skipping"
          fi
